<div class="card h-100 shadow-sm border-0">
  <div class="card-body d-flex flex-column">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h5 class="card-title fw-bold mb-0">{{ post.title }}</h5>
      <span class="badge bg-success rounded-pill ms-2" *ngIf="post.category">{{ post.category.name }}</span>
    </div>
    <p class="card-text text-muted flex-grow-1">{{ post.content | slice:0:150 }}{{ post.content.length > 150 ? '...' : '' }}</p>
    <div class="mt-auto">
      <hr>
      <small class="text-body-secondary">
        <i class="bi bi-calendar3 me-1"></i>{{ post.createdDate | date:'longDate' }}
      </small>
    </div>
  </div>
</div>
