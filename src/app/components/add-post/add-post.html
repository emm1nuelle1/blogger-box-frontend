<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h2 class="card-title fw-bold mb-4">
            <i class="bi bi-pencil-square me-2"></i>Create a New Post
          </h2>

          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="title" class="form-label fw-semibold">Title</label>
              <input type="text" class="form-control form-control-lg" id="title"
                     [(ngModel)]="title" name="title"
                     placeholder="Enter the post title" required>
            </div>

            <div class="mb-3">
              <label for="category" class="form-label fw-semibold">Category</label>
              <select class="form-select" id="category"
                      [(ngModel)]="categoryId" name="categoryId" required>
                <option value="" disabled>Select a category</option>
                <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
              </select>
            </div>

            <div class="mb-4">
              <label for="content" class="form-label fw-semibold">Content</label>
              <textarea class="form-control" id="content"
                        [(ngModel)]="content" name="content"
                        rows="8" placeholder="Write your post content here..." required></textarea>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success btn-lg">
                <i class="bi bi-check-lg me-1"></i>Publish
              </button>
              <button type="button" class="btn btn-outline-secondary btn-lg" [routerLink]="['/']">
                <i class="bi bi-x-lg me-1"></i>Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
