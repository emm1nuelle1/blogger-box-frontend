<div class="container mt-4">
  <div class="text-center mb-4">
    <h2 class="fw-bold"><i class="bi bi-journal-richtext me-2"></i>All Blog Posts</h2>
    <p class="text-muted">Discover the latest articles from our community</p>
  </div>

  <div class="row" *ngIf="posts.length > 0">
    <div class="col-md-6 col-lg-4 mb-4" *ngFor="let post of posts">
      <app-post-list-item [post]="post" (deleteEvent)="onDelete($event)"></app-post-list-item>
    </div>
  </div>

  <div *ngIf="posts.length === 0" class="alert alert-info text-center mt-5" role="alert">
    <i class="bi bi-info-circle me-2"></i>No posts available to display. Be the first to write one!
  </div>
</div>
